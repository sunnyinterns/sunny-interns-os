name: E2E Tests

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [run-e2e-tests]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite'
        required: false
        default: 'all'
      run_id:
        description: 'Supabase run ID'
        required: false

env:
  TEST_SUITE: ${{ github.event.client_payload.suite || github.event.inputs.suite || 'all' }}
  TEST_RUN_ID: ${{ github.event.client_payload.run_id || github.event.inputs.run_id || '' }}
  TEST_BASE_URL: https://sunny-interns-os.vercel.app
  SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm install
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Auth dir
        run: mkdir -p playwright/.auth
      - name: Mark running
        if: env.TEST_RUN_ID != ''
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -sf -o /dev/null -X PATCH \
            "${SUPABASE_URL}/rest/v1/test_runs?id=eq.${TEST_RUN_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"running\",\"started_at\":\"${NOW}\"}" || true
      - name: Run tests
        run: npx playwright test --config=playwright.config.ci.ts
        env:
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        continue-on-error: true
      - name: Upload results
        if: always() && env.TEST_RUN_ID != ''
        run: |
          if [ -f test-results.json ]; then
            python3 scripts/upload-test-results.py test-results.json "${TEST_RUN_ID}" || true
          else
            NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            curl -sf -o /dev/null -X PATCH \
              "${SUPABASE_URL}/rest/v1/test_runs?id=eq.${TEST_RUN_ID}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"failed\",\"finished_at\":\"${NOW}\"}" || true
          fi
      - name: Set run URL
        if: always() && env.TEST_RUN_ID != ''
        run: |
          GH_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -o /dev/null -X PATCH \
            "${SUPABASE_URL}/rest/v1/test_runs?id=eq.${TEST_RUN_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"github_run_id\":\"${{ github.run_id }}\",\"github_run_url\":\"${GH_URL}\"}" || true
      - name: Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ github.run_id }}
          path: test-results.json
          retention-days: 7
          if-no-files-found: ignore
